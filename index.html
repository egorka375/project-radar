<title>Executive Project Radar</title>
<style>
  :root{
    --bg:#0a0b0d; --panel:#131518; --panel2:#1a1d21; --border:#26292e; --border-soft:#1f2226;
    --text:#f4f5f6; --text-dim:#a8adb5; --text-faint:#6b7280;
    --green:#22c55e; --green-bg:rgba(34,197,94,0.12); --green-bd:rgba(34,197,94,0.35);
    --yellow:#eab308; --yellow-bg:rgba(234,179,8,0.12); --yellow-bd:rgba(234,179,8,0.35);
    --red:#ef4444; --red-bg:rgba(239,68,68,0.12); --red-bd:rgba(239,68,68,0.35);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  /* Header */
  .header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border-soft);}
  .title-row{display:flex;align-items:center;gap:10px;}
  .title-row h1{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0;}
  .subtitle{color:var(--text-faint);font-size:13px;margin-top:4px;}
  .header-right{text-align:right;}
  .global-status{display:inline-flex;align-items:center;gap:8px;background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);font-weight:600;font-size:13.5px;padding:7px 14px;border-radius:999px;}
  .updated{color:var(--text-faint);font-size:12px;margin-top:8px;display:flex;align-items:center;gap:6px;justify-content:flex-end;}

  /* Metrics */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
  .metric-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
  .metric-card .label{color:var(--text-faint);font-size:12.5px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;}
  .metric-card .value{font-size:28px;font-weight:700;margin-top:4px;}
  .metric-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* Layout */
  .content{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;}
  .projects{display:flex;flex-direction:column;gap:14px;}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;}
  .card-title{font-size:15.5px;font-weight:600;}
  .card-milestone{color:var(--text-faint);font-size:12.5px;margin-top:4px;display:flex;align-items:center;gap:5px;}

  .badge{border:1px solid transparent;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;position:relative;}
  .badge:hover{filter:brightness(1.15);}
  .badge.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
  .badge.yellow{background:var(--yellow-bg);border-color:var(--yellow-bd);color:var(--yellow);}
  .badge.red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  .dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:150px;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:20;display:none;}
  .dropdown.open{display:block;}
  .dropdown-item{padding:8px 10px;border-radius:6px;font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text-dim);}
  .dropdown-item:hover{background:#22252a;color:var(--text);}

  .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .progress-bar{flex:1;height:7px;border-radius:999px;background:#22252a;overflow:hidden;}
  .progress-fill{height:100%;border-radius:999px;}
  .progress-pct{font-size:12.5px;font-weight:600;color:var(--text-dim);width:36px;text-align:right;}

  .card-summary{font-size:13px;color:var(--text-dim);line-height:1.5;display:flex;gap:8px;align-items:flex-start;}
  .card-summary.risk{color:#fca5a5;}
  .card-summary svg{flex-shrink:0;margin-top:1px;}

  /* Attention panel */
  .attn-panel{background:var(--panel);border:1px solid var(--red-bd);border-radius:14px;padding:18px 20px;position:sticky;top:20px;}
  .attn-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:var(--red);font-weight:700;font-size:14.5px;}
  .attn-sub{color:var(--text-faint);font-size:12px;margin-bottom:14px;}
  .attn-item{border:1px solid var(--border);background:var(--panel2);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .attn-item:last-child{margin-bottom:0;}
  .attn-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .attn-item-name{font-size:13px;font-weight:600;}
  .attn-item-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:999px;letter-spacing:0.03em;}
  .attn-item-tag.yellow{background:var(--yellow-bg);color:var(--yellow);}
  .attn-item-tag.red{background:var(--red-bg);color:var(--red);}
  .attn-item-detail{font-size:12.5px;color:var(--text-dim);line-height:1.5;}

  @media (max-width:900px){
    .metrics{grid-template-columns:repeat(2,1fr);}
    .content{grid-template-columns:1fr;}
    .attn-panel{position:static;}
  }
  @media (max-width:520px){
    .metrics{grid-template-columns:1fr 1fr;}
    .header{flex-direction:column;}
    .header-right{text-align:left;}
    .updated{justify-content:flex-start;}
  }
</style>

<div class="wrap">
  <div class="header">
    <div>
      <div class="title-row">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <h1>Executive Project Radar</h1>
      </div>
      <div class="subtitle">Portfolio health at a glance — 4 active initiatives</div>
    </div>
    <div class="header-right">
      <span class="global-status" id="globalStatus"></span>
      <div class="updated">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="updatedTime"></span>
      </div>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="content">
    <div class="projects" id="projects"></div>
    <div class="attn-panel">
      <div class="attn-header">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
        Attention Required
      </div>
      <div class="attn-sub" id="attnSub"></div>
      <div id="attnList"></div>
    </div>
  </div>
</div>

<script>
const ICONS = {
  check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  alert: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
  ban: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></svg>',
  flag: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 8 2a6 6 0 0 0 3.6-1.2A1 1 0 0 1 21 3.6v10.8a1 1 0 0 1-.4.8A6 6 0 0 1 17 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.5"/></svg>',
  layers: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>',
  info: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'
};

const STATUS_META = {
  'On Track': { color:'green', icon:'check' },
  'At Risk':  { color:'yellow', icon:'alert' },
  'Blocked':  { color:'red', icon:'ban' }
};

const projects = [
  { name:'Core Platform Redesign', status:'On Track', progress:75, milestone:'Go-Live', date:'July 30', summary:'Mobile layout optimized, RNG integrated.', type:'summary' },
  { name:'Global Platform Launch', status:'At Risk', progress:40, milestone:'Beta Testing', date:'August 15', summary:'Payment gateway integration delay.', type:'risk' },
  { name:'Loyalty System & Wheel of Fortune', status:'Blocked', progress:15, milestone:'Math Model Specs', date:'July 20', summary:'Waiting for final bonus limit approval from management.', type:'risk' },
  { name:'Casino Provider Integration', status:'On Track', progress:90, milestone:'Final QA', date:'July 18', summary:'Connected 3 new slot providers.', type:'summary' }
];

const colorHex = { green:'#22c55e', yellow:'#eab308', red:'#ef4444' };

function renderGlobalStatus(){
  const onTrack = projects.filter(p=>p.status==='On Track').length;
  const el = document.getElementById('globalStatus');
  el.innerHTML = `<span class="dot"></span> ${onTrack}/${projects.length} Projects On Track`;
  document.getElementById('updatedTime').textContent = 'Last updated: ' + new Date().toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function renderMetrics(){
  const counts = {
    total: projects.length,
    onTrack: projects.filter(p=>p.status==='On Track').length,
    atRisk: projects.filter(p=>p.status==='At Risk').length,
    blocked: projects.filter(p=>p.status==='Blocked').length
  };
  const cards = [
    { label:'Total Projects', value:counts.total, icon:'layers', color:'#818cf8', bg:'rgba(129,140,248,0.12)' },
    { label:'On Track', value:counts.onTrack, icon:'check', color:colorHex.green, bg:'var(--green-bg)' },
    { label:'At Risk', value:counts.atRisk, icon:'alert', color:colorHex.yellow, bg:'var(--yellow-bg)' },
    { label:'Blocked', value:counts.blocked, icon:'ban', color:colorHex.red, bg:'var(--red-bg)' }
  ];
  document.getElementById('metrics').innerHTML = cards.map(c => `
    <div class="metric-card">
      <div>
        <div class="label">${c.label}</div>
        <div class="value">${c.value}</div>
      </div>
      <div class="metric-icon" style="background:${c.bg};color:${c.color}">${ICONS[c.icon]}</div>
    </div>
  `).join('');
}

function renderProjects(){
  document.getElementById('projects').innerHTML = projects.map((p,i) => {
    const meta = STATUS_META[p.status];
    const summaryIcon = p.type==='risk' ? 'flag' : 'info';
    return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-title">${p.name}</div>
          <div class="card-milestone">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/></svg>
            ${p.milestone} &middot; ${p.date}
          </div>
        </div>
        <div style="position:relative;">
          <div class="badge ${meta.color}" onclick="toggleDropdown(${i})">
            ${ICONS[meta.icon]} ${p.status}
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div class="dropdown" id="dd-${i}">
            <div class="dropdown-item">${ICONS.check} Mark On Track</div>
            <div class="dropdown-item">${ICONS.alert} Mark At Risk</div>
            <div class="dropdown-item">${ICONS.ban} Mark Blocked</div>
          </div>
        </div>
      </div>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%;background:${colorHex[meta.color]}"></div></div>
        <div class="progress-pct">${p.progress}%</div>
      </div>
      <div class="card-summary ${p.type==='risk'?'risk':''}" style="color:${p.type==='risk'?colorHex[meta.color]:''}">
        ${ICONS[summaryIcon]}
        <span>${p.summary}</span>
      </div>
    </div>`;
  }).join('');
}

function renderAttention(){
  const flagged = projects.filter(p => p.status==='At Risk' || p.status==='Blocked');
  document.getElementById('attnSub').textContent = `${flagged.length} item${flagged.length!==1?'s':''} need executive input`;
  document.getElementById('attnList').innerHTML = flagged.map(p => {
    const meta = STATUS_META[p.status];
    return `
    <div class="attn-item">
      <div class="attn-item-top">
        <div class="attn-item-name">${p.name}</div>
        <div class="attn-item-tag ${meta.color}">${p.status}</div>
      </div>
      <div class="attn-item-detail">${p.summary}</div>
    </div>`;
  }).join('') || `<div class="attn-item-detail">All projects on track.</div>`;
}

function toggleDropdown(i){
  document.querySelectorAll('.dropdown').forEach(d => {
    if(d.id !== 'dd-'+i) d.classList.remove('open');
  });
  document.getElementById('dd-'+i).classList.toggle('open');
}

document.addEventListener('click', (e) => {
  if(!e.target.closest('.badge') && !e.target.closest('.dropdown')){
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
  }
});

renderGlobalStatus();
renderMetrics();
renderProjects();
renderAttention();
</script>
